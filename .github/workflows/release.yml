name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - run: cargo build --release --locked

      - run: |
          $hash = (Get-FileHash target/release/caps_switch.exe -Algorithm SHA256).Hash
          "$hash  caps_switch.exe" | Out-File -Encoding utf8 -NoNewline caps_switch.exe.sha256

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/caps_switch.exe
            caps_switch.exe.sha256
          generate_release_notes: true
